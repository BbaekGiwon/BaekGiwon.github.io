subject: Projects
listing-order: 3
icon: "/assets/img/clipboard-list.svg"
contents:
  # ── Research ──────────────────────────────────────────────
  - title: Tactile Intelligence in Robotic Hands — KIST HARI Lab
    gallery:
      - /assets/img/projects/proj_KIST_01.png
      - /assets/img/projects/proj_KIST_02.gif
    description:
      - Developed an affordance-aware dexterous grasp generation pipeline from segmented 3D point clouds.
      - Made a modular grasping framework with integrating Large-Language models, part-aware segmentation, and grasp pose generation.
      - Generated training data using NVIDIA Isaac Gym and deployed on a real robot via ROS 2.
    date: 2026

  - title: "Graspium"
    github: "https://graspium-official.github.io/"
    gallery:
      - /assets/img/projects/proj_Graspium_01.png
      - /assets/img/projects/proj_Graspium_02.png
    description:
      - Independent research seminar on dexterous manipulation; weekly paper discussions.
      - Topics included dexterous grasping, multimodal VLA, reinforcement learning, and imitation learning.
      - Presented papers including AffordGrasp, D(R,O), and UniMorphGrasp.
    date: 2026

  - title: "Hecto AI Challenge — **2nd Place**"
    gallery:
      - /assets/img/projects/proj_HECTOAI_01.jpg
      - /assets/img/projects/proj_HECTOAI_02.jpeg
    description:
      - Developed a deepfake detection model based on DINOv3.
      - Constructed a large-scale dataset of 0.6 million images for training and preprocessing.
    date: 2026

  - title: "KEIT AI Life Solution Challenge — **1st Place**"
    gallery:
      - /assets/img/projects/proj_AIsolution_01.jpg
      - /assets/img/projects/proj_AIsolution_02.jpeg
    description:
      - Developed a Flutter-based video call app with CNN-based real-time deepfake detection.
      - Performed server-side SigLIP analysis on suspicious frames and generated Grad-CAM explainability reports.
      - "**Award:** First Place — Chairman's Award of the KEIT Evaluation Committee"
    date: 2025

  # ── Bootcamp Sub-projects ──────────────────────────────────
  - title: "**Like Lion AI CV Bootcamp** — 3 Sub-projects"
    date: Sept. 2025 - Dec. 2025
    subprojects:
      - title: "RT-DETR-Based Autonomous Driving Object Detection"
        github: "..."
        description:
          - Improved autonomous driving object detection performance using a Vision Mamba encoder integrated with RT-DETR.
          - "Technology: PyTorch, RT-DETR, Vision Mamba"

      - title: "Medical Image Captioning"
        github: "..."
        description:
          - Enhanced medical image captioning by combining breast tissue RGB images with segmentation masks.
          - "Technology: PyTorch, Segmentation, Transformer"

      - title: "Deepfake Detection Video Calling Application — 1st Place, KEIT AI Challenge"
        github: "..."
        description:
          - Developed a Flutter-based video calling application with real-time deepfake detection.
          - Generated explainable detection reports using SigLIP-based server-side analysis and Grad-CAM visualizations.
          - "Technology: Flutter, CNN, SigLIP, Grad-CAM"

  - title: "**Doosan Robotics ROKEY Bootcamp** — 4 Sub-projects"
    date: Mar. 2025 - Sept. 2025
    subprojects:
      - title: "Lane Following Autonomous Navigation with TurtleBot3"
        github: "..."
        description:
          - Developed a lane-following autonomous navigation system using a downward-facing camera on TurtleBot3.
          - Deployed the system from Gazebo simulation to a real robot through a digital twin workflow.
          - "Technology: ROS 2, OpenCV, TurtleBot3, Gazebo"

      - title: "Autonomous Mobile Robot with TurtleBot4"
        github: "..."
        description:
          - Implemented a fully autonomous mobile robot pipeline integrating RGB-D cameras, LiDAR, YOLO, SLAM, and Nav2.
          - "Technology: ROS 2, TurtleBot4, YOLO, SLAM, Nav2"

      - title: "Autonomous Samgyeopsal Grilling Robot Service"
        github: "..."
        description:
          - Designed and developed a robotic service system for automated pork belly grilling.
          - "Technology: ROS 2"

      - title: "Voice-Guided Kitchen Assistant Robot"
        github: "..."
        description:
          - Developed a kitchen assistant robot combining YOLO-based segmentation, PCA-based grasp pose estimation, and MediaPipe hand gesture recognition.
          - "Technology: ROS 2, YOLO, PCA, MediaPipe"

  - title: "LG Aimers 5th — **Top 6%**"
    gallery:
      - /assets/img/projects/proj_LGAimers_01.jpeg
    description:
      - Developed an AI model to detect defective products using sensor data from LG Display manufacturing processes.
      - Ranked in the top 6% among more than 750 participating teams.
    date: 2024
