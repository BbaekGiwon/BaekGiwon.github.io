contents:
  # ── Research ──────────────────────────────────────────────
  - title: Tactile Intelligence in Robotic Hands — KIST HARI Lab
    github: "https://github.com/PLACEHOLDER"
    gallery:
      - /assets/img/placeholder.svg
      - /assets/img/placeholder.svg
    description:
      - Developed an affordance-aware dexterous grasp generation pipeline from segmented 3D point clouds.
      - Integrated vision-language models, part-aware segmentation, and grasp pose generation.
      - Generated training data using NVIDIA Isaac Gym and deployed on a real robot via ROS 2.
    date: 2026

  - title: "Graspium"
    github: "https://graspium-official.github.io/"
    gallery:
      - /assets/img/placeholder.svg
      - /assets/img/placeholder.svg
    description:
      - Independent research seminar on dexterous manipulation; weekly paper discussions.
      - Topics included dexterous grasping, multimodal VLA, reinforcement learning, and imitation learning.
      - Presented papers including AffordGrasp, D(R,O), and UniMorphGrasp.
    date: 2026

  # ── Bootcamp Sub-projects ──────────────────────────────────
  - title: "**Like Lion AI CV Bootcamp** — 3 Sub-projects"
    date: Sept. 2025 - Dec. 2025
    subprojects:
      - title: "RT-DETR 자율주행 Object Detection"
        github: "https://github.com/BbaekGiwon/AICV_pro1"
        gallery:
          - /assets/img/placeholder.svg
          - /assets/img/placeholder.svg
        description:
          - Vision Mamba encoder를 적용해 RT-DETR 기반 자율주행 객체 탐지 성능 향상
          - "Technology: PyTorch, RT-DETR, Vision Mamba"

      - title: "의료 이미지 Captioning"
        github: "https://github.com/BbaekGiwon/AICV_pro2"
        gallery:
          - /assets/img/placeholder.svg
          - /assets/img/placeholder.svg
        description:
